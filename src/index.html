<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >
    <title>MemoTrack</title>
    <link rel="stylesheet" href="output.css">
    <!-- <link rel="stylesheet" href="style/_reset.css">
    <link rel="stylesheet" href="style/styles.css"> -->

    <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
    />


</head>

<body>
    <header>
        <h1>MemoTrack <i class="fa-solid fa-screwdriver-wrench"></i></h1>

        <span
            id="btnCloseFormToggler"
            class="material-symbols-outlined header__btn-close-form"
        >
            close
        </span>
    </header>
    <div class="container">
        <!--Sidebar-->
        <div
            class="sidebar"
            id="sidebar"
        >   
            <h2 class="sidebar__title">Despesa com condução</h2>

            <span id="formInvalid" class="sidebar__form-invalid">Preencha todos os campos!</span>

            <form class="sidebar__form">
                <!--Item Date-->
                <div class="sidebar__item">
                    <label for="date" class="sidebar__label">Dia*</label>
                    <input
                        type="date"
                        id="date"
                        class="sidebar__input"
                    >
                </div>
                <!--Item Customer-->
                <div class="sidebar__item">
                    <label for="customer" class="sidebar__label">Cliente*</label>
                    <input
                        type="text"
                        id="customer"
                        class="sidebar__input"
                        placeholder="Nome do edifício"
                        autocomplete="off"
                    >
                </div>
                <!--Item Work Order-->
                <div class="sidebar__item">
                    <label for="workOrder" class="sidebar__label">Ordem de trabalho*</label>
                    <select
                        name="workOrder"
                        id="workOrder"
                        class="sidebar__select"
                    >
                        <option
                            selected
                            value=""
                        >-- selecione --</option>
                        <option value="1">Manutenção</option>
                        <option value="2">Chamado</option>
                        <option value="3">Serviço</option>
                        <option value="4">Outros</option>
                    </select>
                </div>
                <!--Item Vt Used-->
                <div class="sidebar__item">
                    <label for="vtUsed" class="sidebar__label">VT Gasto* <span id="vtRangeValue"></span></label>
                    <input
                        type="range"
                        id="vtUsed"
                        class="sidebar__input"
                        value="0"
                        min="0"
                        max="10"
                    >
                </div>

                <button
                    type="button"
                    class="sidebar__button"
                    id="btnInsert"
                >Salvar</button>
            </form>
            
            <div class="sidebar__footer"></div>
        </div>

        <!--Content Hub-->
        <div
            class="contentHub"
            id="contentHub"
        >
            <!--Content Hub Header-->
            <div class="contentHub__header">
                <!--Filter and Insert-->
                <div class="contentHub__controls">
                    <div class="contentHub__filter">
                        <label for="selectMonthFilter" class="contentHub__filter-label">Filtro</label>
                        <select
                            id="selectMonthFilter"
                            class="contentHub__month-select"
                        >
                            <option value="01">Janeiro</option>
                            <option value="02">Fevereiro</option>
                            <option value="03">Março</option>
                            <option value="04">Abril</option>
                            <option value="05">Maio</option>
                            <option value="06">Junho</option>
                            <option value="07">Julho</option>
                            <option value="08">Agosto</option>
                            <option value="09">Setembro</option>
                            <option value="10">Outubro</option>
                            <option value="11">Novembro</option>
                            <option value="12">Dezembro</option>
                        </select>
                    </div>

                    <span
                        id="btnFormToggler"
                        class="material-symbols-outlined contentHub__icon contentHub__icon--form-toggler"
                    >
                        add
                    </span>
                </div>
                <!--Scanner and Delete-->
                <div class="contentHub__actions">
                    <span
                        class="material-symbols-outlined contentHub__icon contentHub__icon--gen-pdf"
                        id="btnGenPdf"
                    >
                        task
                    </span>

                    <span
                        id="btnClearAll"
                        class="material-symbols-outlined contentHub__icon contentHub__icon--clear-all"
                    >
                        delete
                    </span>
                </div>
            </div>

            <!--Content Hub Body-->
            <div
                class="contentHub__body"
                id="contentHubBody"
            >
            </div>
        </div>

        <!--Modal-->
        <div
            id="modal"
            class="modal"
        >
            <div class="modal__header">
                <h2 class="modal__title">Excluir todos</h2>
            </div>
            <div class="modal__body">
                <p>Tem certeza que deseja excluir todos os registros do mês <span id="deleteMonth"></span>?</p>
                <div class="modal__actions">
                    <button id="btnDeleteYes" class="modal__button modal__button--confirm">Sim</button>
                    <button id="btnDeleteNo" class="modal__button modal__button--cancel">Não</button>
                </div>
            </div>
        </div>

        <!--Overlay-->
        <div class="overlay"></div>
    </div>
    <script
        type="module"
        src="../dist/bundle.js"
    ></script>

</body>

</html>
