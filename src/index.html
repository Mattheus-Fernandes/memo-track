<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >
    <title>MemoTrack</title>
    <link
        rel="stylesheet"
        href="style/_reset.css"
    >
    <link
        rel="stylesheet"
        href="style/styles.css"
    >

    <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
    />


</head>

<body>
    <header>
        <h1>MemoTrack <i class="fa-solid fa-screwdriver-wrench"></i></h1>

        <span
            id="btnCloseFormToggler"
            class="material-symbols-outlined btnCloseFormToggler"
        >
            close
        </span>
    </header>
    <div class="container">
        <!--Sidebar-->
        <div
            class="sidebar"
            id="sidebar"
        >   
            <h2>Despesa com condução</h2>

            <span id="formInvalid" class="form-invalid">Preencha todos os campos!</span>

            <form>
                <!--Item Date-->
                <div class="item">
                    <label for="date">Dia*</label>
                    <input
                        type="date"
                        id="date"
                    >
                </div>
                <!--Item Customer-->
                <div class="item">
                    <label for="customer">Cliente*</label>
                    <input
                        type="text"
                        id="customer"
                        placeholder="Nome do edifício"
                        autocomplete="off"
                    >
                </div>
                <!--Item Work Order-->
                <div class="item">
                    <label for="workOrder">Ordem de trabalho*</label>
                    <select
                        name="workOrder"
                        id="workOrder"
                    >
                        <option
                            selected
                            value=""
                        >-- Selecione --</option>
                        <option value="1">Manutenção</option>
                        <option value="2">Chamado</option>
                        <option value="3">Serviço</option>
                        <option value="4">Outros</option>
                    </select>
                </div>
                <!--Item Vt Used-->
                <div class="item">
                    <label for="vtUsed">VT Gasto* <span id="vtRangeValue"></span></label>
                    <input
                        type="range"
                        id="vtUsed"
                        value="0"
                        min="0"
                        max="10"
                    >
                </div>

                <button
                    type="button"
                    class="btnInsert"
                    id="btnInsert"
                >Salvar</button>
            </form>
            
            <div class="sidebar-footer"></div>
        </div>

        <!--Content Hub-->
        <div
            class="contentHub"
            id="contentHub"
        >
            <!--Content Hub Header-->
            <div class="contentHub-header">
                <!--Filter and Insert-->
                <div>
                    <div class="filter">
                        <span>Filtro</span>
                        <select
                            id="selectMonthFilter"
                            class="month-selected"
                        >
                            <option value="01">Janeiro</option>
                            <option value="02">Fevereiro</option>
                            <option value="03">Março</option>
                            <option value="04">Abril</option>
                            <option value="05">Maio</option>
                            <option value="06">Junho</option>
                            <option value="07">Julho</option>
                            <option value="08">Agosto</option>
                            <option value="09">Setembro</option>
                            <option value="10">Outubro</option>
                            <option value="11">Novembro</option>
                            <option value="12">Dezembro</option>
                        </select>
                    </div>

                    <span
                        id="btnFormToggler"
                        class="material-symbols-outlined icon btnFormToggler"
                    >
                        add
                    </span>
                </div>
                <!--Scanner and Delete-->
                <div>
                    <span
                        class="material-symbols-outlined icon"
                        id="btnGenPdf"
                    >
                        task
                    </span>

                    <span
                        id="btnClearAll"
                        class="material-symbols-outlined icon"
                    >
                        delete
                    </span>
                </div>
            </div>

            <!--Content Hub Body-->
            <div
                class="contentHub-body"
                id="contentHubBody"
            >
            </div>
        </div>

        <!--Modal-->
        <div
            id="modal"
            class="modal"
        >
            <div class="modal-header">
                <h2>Excluir todos</h2>
            </div>
            <div class="modal-body">
                <p>Tem certeza que deseja excluir todos os registros do mês <span id="deleteMonth"></span>?</p>
                <div class="modal-actions">
                    <button id="btnDeleteYes">Sim</button>
                    <button id="btnDeleteNo">Não</button>
                </div>
            </div>
        </div>

        <!--Overlay-->
        <div class="overlay"></div>
    </div>
    <script
        type="module"
        src="../dist/bundle.js"
    ></script>

</body>

</html>
